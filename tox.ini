[tox]
envlist = unit, lint, format, build

# Alias: "tox -e test" works as a synonym for "tox -e unit"
[testenv:test]
description = {[testenv:unit]description}
deps = {[testenv:unit]deps}
allowlist_externals = {[testenv:unit]allowlist_externals}
commands = {[testenv:unit]commands}
skip_missing_interpreters = true
isolated_build = true

[testenv]
description = Base environment (Python 3.12)
basepython = python3.12
passenv = USER,HOME,PATH,K8S_ARCH,SYSTEM_ARCH,IMAGE_ARCH,DEBUG
setenv = PYTHONPATH = {toxinidir}/src
package = wheel
wheel_build_env = .pkg
install_command = uv pip install --python {basepython} {opts} {packages}

# Unit testing with pytest
[testenv:unit]
description = Run pytest suite
runner = uv-venv-lock-runner
dependency_groups = unit
allowlist_externals = pytest
commands = pytest tests/ -v {posargs}

# Linting with ruff and mypy
[testenv:lint]
description = Run Static analysis checks
runner = uv-venv-lock-runner
dependency_groups = lint
commands =
    ruff check src tests {posargs}
    mypy src --strict {posargs}

# Formatting with ruff
[testenv:format]
description = Run code formatter
runner = uv-venv-lock-runner
dependency_groups = lint
commands =
    ruff format src tests {posargs}
    ruff check --fix src tests {posargs}

# Build distribution
[testenv:build]
description = Build distribution wheel and sdist
runner = uv-venv-lock-runner
dependency_groups = build
allowlist_externals = python
commands = python -m build
