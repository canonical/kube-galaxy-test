[tox]
envlist = test, lint, type, build
skip_missing_interpreters = true
isolated_build = true

[testenv]
description = Base environment (Python 3.12)
basepython = python3.12
passenv = USER,HOME,PATH,K8S_ARCH,SYSTEM_ARCH,IMAGE_ARCH,DEBUG
setenv = PYTHONPATH = {toxinidir}/src
package = wheel
wheel_build_env = .pkg
install_command = uv pip install --python {basepython} {opts} {packages}
commands_pre = uv pip install --python {basepython} -e . --no-deps

# Testing with pytest
[testenv:test]
description = Run pytest suite
deps =
    pytest>=7.0
    pytest-cov>=4.0
    pytest-mock>=3.10
allowlist_externals = pytest
commands = pytest tests/ -v {posargs}

# Linting with ruff
[testenv:lint]
description = Run ruff linter and formatter
deps =
    ruff>=0.1.0
allowlist_externals = ruff
commands =
    ruff check src tests --fix {posargs}
    ruff format src tests {posargs}

# Type checking with mypy
[testenv:type]
description = Run mypy type checker
deps =
    mypy>=1.0
    types-pyyaml
allowlist_externals = mypy
commands = mypy src --strict {posargs}

# Build distribution
[testenv:build]
description = Build distribution wheel and sdist
deps =
    build>=0.10
    wheel>=0.40
allowlist_externals = python
commands = python -m build
