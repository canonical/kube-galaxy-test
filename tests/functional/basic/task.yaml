summary: Test basic Kubernetes cluster functionality

details: |
    This test verifies that the basic Kubernetes cluster is functioning correctly:
    - Cluster is accessible via kubectl
    - All system components are running
    - Basic pod scheduling works
    - Service discovery is functional
    - DNS resolution works within the cluster

prepare: |
    # Create test namespace
    kubectl create namespace test-basic --dry-run=client -o yaml | kubectl apply -f -

    # Ensure namespace is ready
    kubectl wait --for=condition=Active namespace/test-basic --timeout=60s

restore: |
    # Clean up test resources
    kubectl delete namespace test-basic --ignore-not-found=true || true

execute: |
    echo "=== Testing Basic Cluster Functionality ==="

    # Test 1: Verify cluster info is accessible
    echo "Test 1: Cluster accessibility"
    kubectl cluster-info

    # Test 2: Check that all nodes are ready
    echo "Test 2: Node readiness"
    kubectl get nodes
    if ! kubectl wait --for=condition=Ready nodes --all --timeout=60s; then
        echo "FAIL: Not all nodes are ready"
        exit 1
    fi
    echo "PASS: All nodes are ready"

    # Test 3: Verify system pods are running
    echo "Test 3: System pods status"
    kubectl get pods -n kube-system
    if ! kubectl wait --for=condition=Ready pods --all -n kube-system --timeout=120s; then
        echo "FAIL: Not all system pods are ready"
        kubectl get pods -n kube-system -o wide
        exit 1
    fi
    echo "PASS: All system pods are ready"

    # Test 4: Test basic pod scheduling
    echo "Test 4: Basic pod scheduling"
    cat <<EOF | kubectl apply -f -
    apiVersion: v1
    kind: Pod
    metadata:
      name: test-pod
      namespace: test-basic
    spec:
      containers:
      - name: test-container
        image: busybox:1.35
        command: ['sh', '-c', 'echo "Hello from test pod" && sleep 30']
      restartPolicy: Never
    EOF

    if ! kubectl wait --for=condition=Ready pod/test-pod -n test-basic --timeout=120s; then
        echo "FAIL: Test pod failed to become ready"
        kubectl describe pod test-pod -n test-basic
        exit 1
    fi
    echo "PASS: Test pod scheduled and running successfully"

    # Test 5: Verify pod logs are accessible
    echo "Test 5: Pod log access"
    if ! kubectl logs test-pod -n test-basic | grep -q "Hello from test pod"; then
        echo "FAIL: Could not retrieve expected logs from test pod"
        kubectl logs test-pod -n test-basic
        exit 1
    fi
    echo "PASS: Pod logs accessible and correct"

    # Test 6: Test service creation and connectivity
    echo "Test 6: Service creation and connectivity"
    cat <<EOF | kubectl apply -f -
    apiVersion: v1
    kind: Service
    metadata:
      name: test-service
      namespace: test-basic
    spec:
      selector:
        app: test-app
      ports:
      - port: 80
        targetPort: 8080
      type: ClusterIP
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: test-deployment
      namespace: test-basic
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: test-app
      template:
        metadata:
          labels:
            app: test-app
        spec:
          containers:
          - name: test-server
            image: nginx:1.21-alpine
            ports:
            - containerPort: 80
    EOF

    if ! kubectl wait --for=condition=available deployment/test-deployment -n test-basic --timeout=120s; then
        echo "FAIL: Test deployment failed to become available"
        kubectl describe deployment test-deployment -n test-basic
        exit 1
    fi
    echo "PASS: Test deployment is available"

    # Test 7: DNS resolution within cluster
    echo "Test 7: DNS resolution"
    kubectl run dns-test --image=busybox:1.35 --rm -it --restart=Never -n test-basic -- nslookup kubernetes.default.svc.cluster.local > dns-test.log 2>&1 &
    sleep 10

    if ! grep -q "kubernetes.default.svc.cluster.local" dns-test.log 2>/dev/null; then
        echo "FAIL: DNS resolution test failed"
        cat dns-test.log 2>/dev/null || echo "No DNS test log available"
        exit 1
    fi
    echo "PASS: DNS resolution working correctly"

    echo "=== All Basic Functionality Tests Passed ==="
