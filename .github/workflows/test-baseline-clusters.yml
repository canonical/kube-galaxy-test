name: Test Baseline Clusters

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'manifests/*.yaml'
      - 'components/**'
      - 'tests/**'
      - '.github/workflows/test-baseline-clusters.yml'
      - '.github/workflows/reusable-cluster-test.yml'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'src/**'
      - 'manifests/*.yaml'
      - 'components/**'
      - 'tests/**'
      - '.github/workflows/test-baseline-clusters.yml'
      - '.github/workflows/reusable-cluster-test.yml'
      - 'pyproject.toml'
  workflow_dispatch:
    inputs:
      k8s-version:
        description: 'Specific K8s version to test (leave empty for all)'
        required: false
      test-suite:
        description: 'Test suite to run'
        required: false
        default: 'functional-basic'

permissions:
  contents: read
  packages: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Derive manifests dynamically based on trigger and ci-skip flags
  derive-manifests:
    runs-on: ubuntu-latest
    outputs:
      manifests: ${{ steps.derive.outputs.manifests }}
    steps:
      - name: Derive manifest files
        id: derive
        shell: bash
        run: |
          # Filter manifests based on event type
          # On PRs (pull_request event OR push to PR branch): run standard tests
          # On other events: run longer tests from the conformance-full overlay

          manifests="[]"

          # Check if this is a PR-related event
          IS_PR=false
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            IS_PR=true
            echo "Detected pull_request event"
          elif [ "${{ github.head_ref }}" != "" ]; then
            IS_PR=true
            echo "Detected push to PR branch: ${{ github.head_ref }}"
          fi

          if [ "$IS_PR" = "true" ]; then
            manifests='[{"manifest-file":"manifests/smoketest.yaml","overlays":[]},{"manifest-file":"manifests/smoketest-kind.yaml","overlays":[]}]'
          else
            echo "Non-PR context: Including all manifests"
            manifests='[{"manifest-file":"manifests/smoketest.yaml","overlays":["manifests/overlays/conformance-full.yaml"]}]'
          fi

          echo "manifests=$manifests" >> $GITHUB_OUTPUT
          echo "Derived manifests: $manifests"

  # Delegate to reusable workflow for actual testing
  run-tests:
    needs: derive-manifests
    if: needs.derive-manifests.outputs.manifests != '[]'
    uses: ./.github/workflows/reusable-cluster-test.yml
    with:
      manifests-repo: ${{ github.repository }}
      manifests-ref: ${{ github.head_ref || github.ref_name }}
      kube-galaxy-ref: ${{ github.head_ref || github.ref_name }}
      manifests-json: ${{ needs.derive-manifests.outputs.manifests }}
      create-issues-on-failure: ${{ github.event_name != 'pull_request' }}
    secrets:
      REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
