name: Reusable Cluster Test

on:
  workflow_call:
    inputs:
      manifests-json:
        description: >
          JSON array of manifest objects, e.g.
          [{"manifest-file": "manifests/baseline-k8s-1.35.yaml"}]
        type: string
        required: true
      manifests-repo:
        description: >
          Repository containing manifests (owner/repo). Leave empty when the
          caller repository already contains the manifests.
        type: string
        default: ""
      manifests-ref:
        description: "Git ref to check out from manifests-repo"
        type: string
        default: "main"
      kube-galaxy-repo:
        description: "Git repository for kube-galaxy-test (owner/repo)"
        type: string
        default: "canonical/kube-galaxy-test"
      kube-galaxy-ref:
        description: "Git ref for installing kube-galaxy-test with uv"
        type: string
        default: "main"
      timeout-minutes:
        description: "Per-matrix-job timeout"
        type: number
        default: 90
      create-issues-on-failure:
        description: "Open a GitHub issue when a test job fails"
        type: boolean
        default: false
    secrets:
      REPO_ACCESS_TOKEN:
        description: "GitHub token used as GITHUB_TOKEN for container registry auth and kube-galaxy setup"
        required: false
      DOCKERHUB_USERNAME:
        description: "Docker Hub username for authenticated image pulls"
        required: false
      DOCKERHUB_TOKEN:
        description: "Docker Hub access token for authenticated image pulls"
        required: false

permissions:
  contents: read
  packages: read
  issues: write

jobs:
  # ------------------------------------------------------------------
  # Matrix job: one runner per manifest
  # ------------------------------------------------------------------
  test-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.manifests-json) }}

    steps:
      # ---- Checkout local directory for manifests and components ----
      - name: Checkout manifests repo
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.manifests-repo }}
          ref: ${{ inputs.manifests-ref }}

      - name: Setup Astral UV
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.12"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ">=1.22"

      - name: Install Spread
        run: go install github.com/canonical/spread/cmd/spread@latest

      - name: Setup LXD
        uses: canonical/setup-lxd@main

      - name: Setup Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: cdkbot
          password: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install kube-galaxy
        shell: bash
        run: |
          uv tool install "git+https://github.com/${{ inputs.kube-galaxy-repo }}.git@${{ inputs.kube-galaxy-ref }}"
          kube-galaxy --version

      - name: Display Cluster Configuration
        shell: bash
        run: |
          echo "## Test Configuration"
          echo "- **Manifest**: ${{ matrix.manifest-file }}"
          echo "- **Runner**: ubuntu-latest"
          echo "- **Timeout**: ${{ inputs.timeout-minutes }} minutes"

      - name: Setup Cluster
        id: setup-cluster
        shell: bash
        env:
          GITHUB_ACTOR: cdkbot
          GITHUB_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Sanitized name for artifact uploads
          ARTIFACT_NAME=$(echo "${{ matrix.manifest-file }}" | sed 's/\//-/g')
          echo "artifact-name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

          kube-galaxy setup ${{ matrix.manifest-file }}

      - name: Verify Cluster Health
        shell: bash
        run: |
          kube-galaxy status --wait --timeout 300

      - name: Run Spread Tests
        id: run-tests
        shell: bash
        run: |
          kube-galaxy test ${{ matrix.manifest-file }}

      - name: Collect Logs
        if: always()
        shell: bash
        run: |
          kube-galaxy logs ${{ matrix.manifest-file }}

      - name: Rename log files for safe-upload
        if: always()
        shell: bash
        run: |
          # Avoid invalid characters in file names:
          # Double quote ", Colon :, Less than <, Greater than >, Vertical bar |, Asterisk *, Question mark ?, Carriage return \r, Line feed \n
          mkdir -p debug-logs
          find debug-logs -depth -mindepth 1 | while read -r path; do
            dir=$(dirname "$path")
            base=$(basename "$path")
            safe=$(echo "$base" | tr '":<>|*?\\' '--------')
            if [ "$base" != "$safe" ]; then mv "$path" "$dir/$safe"; fi
          done

      - name: Upload Debug Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-logs-${{ steps.setup-cluster.outputs.artifact-name || hashFiles(matrix.manifest-file) }}
          path: debug-logs/
          retention-days: 30

      - name: Setup upterm session for debugging
        if: failure() && github.event_name == 'pull_request'
        uses: owenthereal/action-upterm@v1
        timeout-minutes: 5
        with:
          limit-access-to-actor: true

      - name: Create Issue on Failure
        if: failure() && inputs.create-issues-on-failure
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[TEST FAILURE] Manifest ${{ matrix.manifest-file }} - Run #${{ github.run_number }}" \
            --body "Cluster test failed for manifest: \`${{ matrix.manifest-file }}\`

          Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Check test results and debug logs in the action artifacts." || echo "Failed to create issue, continuing..."

      - name: Cleanup Cluster
        if: always()
        shell: bash
        run: |
          kube-galaxy cleanup all

  # ------------------------------------------------------------------
  # Summary: single pass/fail gate
  # ------------------------------------------------------------------
  test-summary:
    needs: test-matrix
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Test Results
        shell: bash
        run: |
          echo "## Test Summary"
          echo "- **Result**: ${{ needs.test-matrix.result }}"

          if [ "${{ needs.test-matrix.result }}" == "failure" ]; then
            echo ""
            echo "Some tests failed -- check individual job results above for details"
            exit 1
          else
            echo ""
            echo "All tests passed"
          fi
