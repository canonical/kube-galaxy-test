name: Reusable Cluster Test

on:
  workflow_call:
    inputs:
      manifests-json:
        description: >
          JSON array of manifest objects, e.g.
          [{"manifest-file": "manifests/baseline-k8s-1.35.yaml", "overlays": []}]
        type: string
        required: true
      manifests-repo:
        description: >
          Repository containing manifests (owner/repo). Leave empty when the
          caller repository already contains the manifests.
        type: string
        default: ""
      manifests-ref:
        description: "Git ref to check out from manifests-repo"
        type: string
        default: "main"
      kube-galaxy-repo:
        description: "Git repository for kube-galaxy-test (owner/repo)"
        type: string
        default: "canonical/kube-galaxy-test"
      kube-galaxy-ref:
        description: "Git ref for installing kube-galaxy-test with uv"
        type: string
        default: "main"
      timeout-minutes:
        description: "Per-matrix-job timeout"
        type: number
        default: 90
      create-issues-on-failure:
        description: "Open a GitHub issue when a test job fails"
        type: boolean
        default: false
      runs-on:
        description: "Runner labels for test jobs (e.g. 'ubuntu-latest' or 'self-hosted,linux,x64')"
        type: string
        default: "ubuntu-latest"
    secrets:
      REPO_ACCESS_TOKEN:
        description: "GitHub token used as GITHUB_TOKEN for container registry auth and kube-galaxy setup"
        required: false
      DOCKERHUB_USERNAME:
        description: "Docker Hub username for authenticated image pulls"
        required: false
      DOCKERHUB_TOKEN:
        description: "Docker Hub access token for authenticated image pulls"
        required: false

permissions:
  contents: read
  packages: read
  issues: write

jobs:
  # ------------------------------------------------------------------
  # Matrix job: one runner per manifest
  # ------------------------------------------------------------------
  setup:
    name: Setup Test Matrix
    runs-on: ubuntu-latest
    outputs:
      runs-on: ${{ steps.split-runs-on.outputs.runs-on }}
    steps:
      - name: Split runs-on labels
        id: split-runs-on
        shell: bash
        run: |
          # Output the runs-on labels as a JSON array for use in next job
          RUNS_ON=$(echo "${{ inputs.runs-on }}" \
            | jq -cR 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
          echo "runs-on=$RUNS_ON" >> "$GITHUB_OUTPUT"

  test-matrix:
    needs: setup
    runs-on: ${{ fromJson(needs.setup.outputs.runs-on) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.manifests-json) }}
    steps:
      - name: Validate Manifest File
        shell: bash
        run: |
          test -n "${{ matrix.manifest-file }}" || {
            echo "manifest-file is required"
            exit 1
          }

      - name: Validate Manifest overlays
        shell: bash
        run: |
          overlays='${{ toJson(matrix.overlays) }}'

          echo "$overlays" | jq -e '
            . == null
            or (
              type == "array"
              and all(.[]; type == "string")
            )
          ' >/dev/null || {
            echo "ERROR: matrix.overlays must be null or a list of strings"
            exit 1
          }

      # ---- Checkout local directory for manifests and components ----
      - name: Checkout manifests repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ inputs.manifests-repo }}
          ref: ${{ inputs.manifests-ref }}

      - name: Setup Astral UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.12"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ">=1.22"

      - name: Install Spread
        run: go install github.com/canonical/spread/cmd/spread@latest

      - name: Setup LXD
        uses: canonical/setup-lxd@a517a5346a08c624d81953578813a4fc0fe46e0b # main

      - name: Setup kubectl
        uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b # v5
        with:
          version: "latest"

      - name: Setup Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: cdkbot
          password: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install kube-galaxy
        shell: bash
        run: |
          uv tool install "git+https://github.com/${{ inputs.kube-galaxy-repo }}.git@${{ inputs.kube-galaxy-ref }}"
          kube-galaxy --version

      - name: Display Cluster Configuration
        shell: bash
        run: |
          echo "## Test Configuration"
          echo "- **Manifest**: ${{ matrix.manifest-file }}"
          echo "- **Runner**: ubuntu-latest"
          echo "- **Timeout**: ${{ inputs.timeout-minutes }} minutes"

      - name: Setup Cluster
        id: setup-cluster
        shell: bash
        env:
          GITHUB_ACTOR: cdkbot
          GITHUB_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Sanitized name for artifact uploads
          ARTIFACT_NAME=$(echo "${{ matrix.manifest-file }}" | sed 's/\//-/g')
          echo "artifact-name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

          OVERLAY_FLAGS=""
          for ov in $(echo '${{ toJson(matrix.overlays) }}' | jq -r '.[]? // empty'); do
            OVERLAY_FLAGS="$OVERLAY_FLAGS --overlay $ov"
          done

          kube-galaxy setup ${{ matrix.manifest-file }} $OVERLAY_FLAGS

      - name: Verify Cluster Health
        shell: bash
        run: |
          kube-galaxy status --wait --timeout 300

      - name: Run Spread Tests
        id: run-tests
        shell: bash
        run: |
          kube-galaxy test

      - name: Collect Logs
        if: always()
        shell: bash
        run: |
          kube-galaxy logs

      - name: Rename log files for safe-upload
        if: always()
        shell: bash
        run: |
          # Avoid invalid characters in file names:
          # Double quote ", Colon :, Less than <, Greater than >, Vertical bar |, Asterisk *, Question mark ?, Carriage return \r, Line feed \n
          mkdir -p debug-logs
          find debug-logs -depth -mindepth 1 | while read -r path; do
            dir=$(dirname "$path")
            base=$(basename "$path")
            safe=$(echo "$base" | tr '":<>|*?\\' '--------')
            if [ "$base" != "$safe" ]; then mv "$path" "$dir/$safe"; fi
          done

      - name: Upload Debug Logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: debug-logs-${{ steps.setup-cluster.outputs.artifact-name || hashFiles(matrix.manifest-file) }}
          path: debug-logs/
          retention-days: 30

      - name: Setup upterm session for debugging
        if: failure() && github.event_name == 'pull_request'
        uses: owenthereal/action-upterm@f26ebc11e22a09b8365f39d2cdafd06f63b42053 # v1
        timeout-minutes: 5
        with:
          limit-access-to-actor: true

      - name: Create Issue on Failure
        if: failure() && inputs.create-issues-on-failure
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[TEST FAILURE] Manifest ${{ matrix.manifest-file }} - Run #${{ github.run_number }}" \
            --body "Cluster test failed for manifest: \`${{ matrix.manifest-file }}\`

          Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Check test results and debug logs in the action artifacts." || echo "Failed to create issue, continuing..."

      - name: Cleanup Cluster
        if: always()
        shell: bash
        run: |
          kube-galaxy cleanup all

  # ------------------------------------------------------------------
  # Summary: single pass/fail gate
  # ------------------------------------------------------------------
  test-summary:
    needs: test-matrix
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Test Results
        shell: bash
        run: |
          echo "## Test Summary"
          echo "- **Result**: ${{ needs.test-matrix.result }}"

          if [ "${{ needs.test-matrix.result }}" == "failure" ]; then
            echo ""
            echo "Some tests failed -- check individual job results above for details"
            exit 1
          else
            echo ""
            echo "All tests passed"
          fi
