name: Test vSphere Clusters

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'manifests/*.yaml'
      - 'manifests/overlays/vsphere-juju.yaml'
      - 'components/**'
      - '.github/workflows/test-vsphere-clusters.yml'
      - '.github/workflows/reusable-cluster-test.yml'
      - 'pyproject.toml'
  # Manual trigger for ad-hoc vSphere testing
  pull_request:
    paths:
      - 'src/**'
      - 'manifests/*.yaml'
      - 'components/**'
      - 'tests/**'
      - '.github/workflows/test-baseline-clusters.yml'
      - '.github/workflows/reusable-cluster-test.yml'
      - 'pyproject.toml'
  workflow_dispatch:
    inputs:
      cleanup-on-success:
        description: 'Destroy Juju model after a successful run'
        type: boolean
        default: true

permissions:
  contents: read
  packages: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # -------------------------------------------------------------------
  # Create a fresh Juju model on the existing vSphere controller, then
  # delegate to the reusable cluster-test workflow.The actions operator
  # allows for automatic deployment of a vsphere controller.
  # -------------------------------------------------------------------
  prepare:
    name: Bootstrap Juju on vSphere
    runs-on: [self-hosted-linux-amd64-noble-private-endpoint-medium]
    outputs:
      model-name: ${{ steps.model.outputs.name }}
    steps:
      - name: Route vSphere traffic through proxy (PS7 only)
        run: |
          # On PS7 runners, aproxy is a transparent HTTP/HTTPS proxy.
          # It can handle TLS (443) via ClientHello SNI peek but NOT:
          #   - raw SSH (22) — no TLS ClientHello to inspect
          #   - Juju API (17070) — connects by IP, so TLS ClientHello has
          #     no SNI hostname; aproxy cannot form a valid CONNECT request.
          #
          # Three proxy strategies, one per traffic type:
          #   443  → nftables REDIRECT → aproxy (SNI-based, works)
          #   22   → SSH ProxyCommand → nc CONNECT → squid (proven)
          #   17070 → nftables REDIRECT → local TCP-to-CONNECT bridge → squid
          #
          # The bridge for 17070 is the network-level equivalent of SSH's
          # ProxyCommand: it intercepts redirected TCP, extracts the original
          # destination via SO_ORIGINAL_DST, and tunnels through squid's
          # HTTP CONNECT — no dependency on env var propagation or snap
          # confinement behavior.
          APROXY_PORT=$(ps aux | grep -oP 'aproxy.*--listen :\K[0-9]+' | head -1)
          if [ -n "$APROXY_PORT" ]; then
            echo "PS7 runner detected (aproxy port $APROXY_PORT)"

            # 1) vCenter HTTPS (443) — hostname-based TLS, aproxy peeks SNI.
            sudo nft insert rule ip nat OUTPUT ip daddr 10.246.152.0/21 tcp dport 443 redirect to :"$APROXY_PORT"
            echo "nftables: 10.246.152.0/21:443 → aproxy (:$APROXY_PORT)"

            # 2) Juju API (17070) — IP-based TLS, no SNI.
            #    Run a local TCP-to-CONNECT bridge and redirect through it.
            cat > /tmp/connect-bridge.py << 'PYEOF'
          """TCP-to-HTTP-CONNECT bridge for nftables REDIRECT.

          Accepts connections redirected by nftables, recovers the original
          destination via SO_ORIGINAL_DST, and tunnels through an HTTP
          CONNECT proxy (squid).  Same mechanism as SSH ProxyCommand
          'nc -X connect' but at the network level for any TCP traffic.
          """
          import socket, struct, select, threading, sys

          SO_ORIGINAL_DST = 80
          PROXY = ("egress.ps7.internal", 3128)
          LISTEN_PORT = 17071

          def bridge(c, p):
              socks = [c, p]
              while True:
                  readable, _, _ = select.select(socks, [], [], 120)
                  if not readable:
                      break
                  for s in readable:
                      data = s.recv(65536)
                      if not data:
                          return
                      (p if s is c else c).sendall(data)

          def handle(client):
              proxy = None
              try:
                  dst = client.getsockopt(socket.SOL_IP, SO_ORIGINAL_DST, 16)
                  port = struct.unpack(">H", dst[2:4])[0]
                  ip = socket.inet_ntoa(dst[4:8])
                  proxy = socket.create_connection(PROXY, timeout=30)
                  req = f"CONNECT {ip}:{port} HTTP/1.1\r\nHost: {ip}:{port}\r\n\r\n"
                  proxy.sendall(req.encode())
                  resp = b""
                  while b"\r\n\r\n" not in resp:
                      chunk = proxy.recv(4096)
                      if not chunk:
                          break
                      resp += chunk
                  status = resp.split(b"\r\n")[0]
                  if b"200" not in status:
                      print(f"CONNECT {ip}:{port} rejected: {status.decode()}", flush=True)
                      return
                  print(f"tunnel {ip}:{port} established", flush=True)
                  bridge(client, proxy)
              except Exception as e:
                  print(f"bridge error: {e}", flush=True)
              finally:
                  try: client.close()
                  except: pass
                  if proxy:
                      try: proxy.close()
                      except: pass

          srv = socket.socket()
          srv.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          srv.bind(("127.0.0.1", LISTEN_PORT))
          srv.listen(16)
          print(f"TCP-to-CONNECT bridge ready on :{LISTEN_PORT}", flush=True)
          while True:
              c, _ = srv.accept()
              threading.Thread(target=handle, args=(c,), daemon=True).start()
          PYEOF
            nohup python3 /tmp/connect-bridge.py &>/tmp/connect-bridge.log &
            BRIDGE_PID=$!
            sleep 0.5
            if kill -0 "$BRIDGE_PID" 2>/dev/null; then
              echo "TCP-to-CONNECT bridge started (PID $BRIDGE_PID)"
            else
              echo "ERROR: bridge failed to start" >&2
              cat /tmp/connect-bridge.log >&2
              exit 1
            fi
            sudo nft insert rule ip nat OUTPUT ip daddr 10.246.152.0/21 tcp dport 17070 redirect to :17071
            echo "nftables: 10.246.152.0/21:17070 → bridge (:17071) → squid CONNECT"

            # Verify squid ACL allows CONNECT on port 17070 to vSphere subnet.
            CONNECT_RESP=$(echo -e "CONNECT 10.246.152.100:17070 HTTP/1.1\r\nHost: 10.246.152.100:17070\r\n\r\n" \
              | nc -w 5 egress.ps7.internal 3128 | head -1 || true)
            echo "squid CONNECT test (10.246.152.100:17070): $CONNECT_RESP"
            if echo "$CONNECT_RESP" | grep -q "200"; then
              echo "squid ACL verified: CONNECT on port 17070 is allowed"
            else
              echo "WARNING: squid CONNECT returned: $CONNECT_RESP"
              echo "Check canonical-is-internal-proxy-configs ps7.conf ACL for kubernetes_vsphere_ip + Juju_controller_port"
            fi

            # 3) SSH — ProxyCommand tunnels through squid via HTTP CONNECT.
            mkdir -p ~/.ssh
            cat >> ~/.ssh/config <<'EOF'
          Host 10.246.152.* 10.246.153.* 10.246.154.* 10.246.155.* 10.246.156.* 10.246.157.* 10.246.158.* 10.246.159.*
            ProxyCommand nc -X connect -x egress.ps7.internal:3128 %h %p
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
            chmod 600 ~/.ssh/config
            echo "SSH ProxyCommand configured for 10.246.152.0/21"
          else
            echo "No aproxy detected — assuming direct connectivity"
          fi

      - name: Debug Network Connectivity
        run: |
          echo "=== Runner identity ==="
          hostname -f || hostname
          ip -4 addr show | grep 'inet ' || true

          echo "=== Route to vCenter ==="
          ip route get 10.246.152.100 || true

          echo "=== Checking vCenter connectivity ==="
          nc -zv -w 10 10.246.152.100 443 || echo "TCP Port 443 is CLOSED or BLOCKED"

          echo "=== nftables OUTPUT chain (all rules) ==="
          sudo nft list chain ip nat OUTPUT 2>/dev/null || echo "Cannot read nftables"

          echo "=== TCP-to-CONNECT bridge ==="
          if [ -f /tmp/connect-bridge.log ]; then
            cat /tmp/connect-bridge.log
          else
            echo "Bridge log not found (aproxy not detected?)"
          fi

          echo "=== Proxy env vars ==="
          echo "HTTPS_PROXY=${HTTPS_PROXY:-<unset>}"
          echo "https_proxy=${https_proxy:-<unset>}"
          echo "NO_PROXY=${NO_PROXY:-<unset>}"

      - name: Setup Juju
        uses: charmed-kubernetes/actions-operator@main
        with:
          provider: vsphere
          credentials-yaml: ${{ secrets.VSPHERE_CREDS }}
          clouds-yaml: ${{ secrets.VSPHERE_CLOUDS }}
          bootstrap-constraints: "arch=amd64"
          bootstrap-options: >-
            --config ssl-hostname-verification=false
            --config caas-image-repo=rocks.canonical.com/cdk/jujusolutions
            --config bootstrap-timeout=3600
            --bootstrap-image=juju-ci-root/templates/noble-test-template
            --bootstrap-base=ubuntu@24.04
            --model-default primary-network=VLAN_2764
            --model-default external-network=VLAN_2764
            --model-default datastore=iSCSI-Datastore-B
            --model-default disk-provisioning-type=thin
            --model-default force-vm-hardware-version=17

      - name: Create test model
        id: model
        shell: bash
        run: |
          MODEL_NAME="kube-galaxy-${GITHUB_RUN_ID}"
          juju add-model \
            --config logging-config='<root>=DEBUG' \
            --config datastore=iSCSI-Datastore-B \
            --config disk-provisioning-type=thin \
            --config primary-network=VLAN_2764 \
            "${MODEL_NAME}" \
            vsphere/Boston || true  # tolerate "already exists"
          juju switch "${MODEL_NAME}"
          echo "name=${MODEL_NAME}" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------
  # Run the actual cluster test via the reusable workflow
  # -------------------------------------------------------------------
  run-tests:
    name: Run cluster tests on vSphere
    needs: prepare
    uses: ./.github/workflows/reusable-cluster-test.yml
    with:
      manifests-repo: ${{ github.repository }}
      manifests-ref: ${{ github.head_ref || github.ref_name }}
      kube-galaxy-ref: ${{ github.head_ref || github.ref_name }}
      manifests-json: >-
        [{"manifest-file":"manifests/smoketest.yaml","overlays":["manifests/overlays/vsphere-juju.yaml"]}]
      runs-on: "self-hosted,linux,x64"
      timeout-minutes: 120
      create-issues-on-failure: ${{ github.event_name != 'pull_request' }}
    secrets:
      REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # -------------------------------------------------------------------
  # Teardown: destroy the Juju model (always runs)
  # -------------------------------------------------------------------
  teardown:
    name: Cleanup vSphere model
    needs: [prepare, run-tests]
    runs-on: [self-hosted-linux-amd64-noble-private-endpoint-medium]
    if: always()
    steps:
      - name: Destroy test model
        shell: bash
        run: |
          MODEL="${{ needs.prepare.outputs.model-name }}"
          if [ -z "$MODEL" ]; then
            echo "No model name found — skipping teardown"
            exit 0
          fi

          # On success + cleanup-on-success=false, skip
          if [ "${{ needs.run-tests.result }}" = "success" ] && [ "${{ inputs.cleanup-on-success }}" = "false" ]; then
            echo "Tests passed and cleanup-on-success is false — keeping model '${MODEL}'"
            exit 0
          fi

          echo "Destroying Juju model '${MODEL}'..."
          juju destroy-model "${MODEL}" --force --no-wait --destroy-storage -y 2>/dev/null || true
