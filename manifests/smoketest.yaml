name: smoke-test
description: Single-node Kubernetes cluster + calico + csi-hostpath - core components only
kubernetes-version: &k8s-version "1.35.2"

# Provider defaults: type: lxd, image: ubuntu:24.04, nodes: {control-plane: 1, worker: 0}
# These are applied automatically when the provider/nodes blocks are absent.
# Override example for local execution:

provider:
  type: lxd
  nodes:
    control-plane: 1
    worker: 1

# artifact:
#   registry:
#     enabled: true                      # default
#     remote-registry:  registry.k8s.io  # default
#     port:    5000                      # default

components:
  # Container runtime
  - name: runc
    category: containerd
    release: "1.3.4"
    installation:
      method: binary
      repo:
        base-url: https://github.com/opencontainers/runc
      source-format: "{{ repo.base-url }}/releases/download/v{{ release }}/runc.{{ arch }}"

  - name: crictl
    category: containerd
    release: "1.35.0"
    installation:
      method: binary-archive
      repo:
        base-url: https://github.com/kubernetes-sigs/cri-tools
      source-format: "{{ repo.base-url }}/releases/download/v{{ release }}/crictl-v{{ release }}-linux-{{ arch }}.tar.gz"

  - name: containerd
    category: containerd
    release: "2.2.1"
    installation:
      method: binary-archive
      bin-path: "./bin/*"
      repo:
        base-url: https://github.com/containerd/containerd
      source-format: "{{ repo.base-url }}/releases/download/v{{ release }}/containerd-{{ release }}-linux-{{ arch }}.tar.gz"

  # cni-plugins
  - name: cni-plugins
    category: container-networking
    release: "1.9.0"
    installation:
      method: binary-archive
      repo:
        base-url: https://github.com/containernetworking/plugins
      source-format: "{{ repo.base-url }}/releases/download/v{{ release }}/cni-plugins-linux-{{ arch }}-v{{ release }}.tgz"

  # Kubernetes core binaries
  - name: kubelet
    category: kubernetes/kubernetes
    release: *k8s-version
    installation:
      method: binary
      repo:
        base-url: https://github.com/kubernetes/kubernetes
      source-format: "https://dl.k8s.io/release/v{{ release }}/bin/linux/{{ arch }}/kubelet"

  - name: kubeadm
    category: kubernetes/kubernetes
    release: *k8s-version
    installation:
      method: binary
      repo:
        base-url: https://github.com/kubernetes/kubernetes
      source-format: "https://dl.k8s.io/release/v{{ release }}/bin/linux/{{ arch }}/kubeadm"

  - name: kubectl
    category: kubernetes/kubernetes
    release: *k8s-version
    installation:
      method: binary
      repo:
        base-url: https://github.com/kubernetes/kubernetes
      source-format: "https://dl.k8s.io/release/v{{ release }}/bin/linux/{{ arch }}/kubectl"

  # Kubernetes control plane components
  - name: kube-apiserver
    category: kubernetes/kubernetes
    release: *k8s-version
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes/kubernetes
      source-format: "registry.k8s.io/kube-apiserver:v{{ release }}"
      retag-format: "{{ mirror.base-url }}/kube-apiserver:v{{ release }}"

  - name: kube-controller-manager
    category: kubernetes/kubernetes
    release: *k8s-version
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes/kubernetes
      source-format: "registry.k8s.io/kube-controller-manager:v{{ release }}"
      retag-format: "{{ mirror.base-url }}/kube-controller-manager:v{{ release }}"

  - name: kube-scheduler
    category: kubernetes/kubernetes
    release: *k8s-version
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes/kubernetes
      source-format: "registry.k8s.io/kube-scheduler:v{{ release }}"
      retag-format: "{{ mirror.base-url }}/kube-scheduler:v{{ release }}"

  - name: kube-proxy
    category: kubernetes/kubernetes
    release: *k8s-version
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes/kubernetes
      source-format: "registry.k8s.io/kube-proxy:v{{ release }}"
      retag-format: "{{ mirror.base-url }}/kube-proxy:v{{ release }}"

  - name: pause
    category: kubernetes/kubernetes
    release: "3.10.1"
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes/kubernetes
      source-format: "registry.k8s.io/pause:{{ release }}"
      retag-format: "{{ mirror.base-url }}/pause:{{ release }}"

  # etcd - required for cluster state
  - name: etcd
    category: etcd
    release: "3.6.6"
    installation:
      method: container-image
      repo:
        base-url: https://github.com/etcd-io/etcd
      source-format: "registry.k8s.io/etcd:v{{ release }}"
      retag-format: "{{ mirror.base-url }}/etcd:{{ release }}-0"

  # CoreDNS - required for cluster DNS
  - name: coredns
    category: coredns
    release: "1.13.1"
    installation:
      method: container-image
      repo:
        base-url: https://github.com/coredns/coredns
      source-format: "registry.k8s.io/coredns/coredns:v{{ release }}"
      retag-format: "{{ mirror.base-url }}/coredns:v{{ release }}"

  # Calico - required for cluster networking
  - name: calico
    category: projectcalico/calico
    release:  &calico-version "3.30.6"
    installation:
      method: container-manifest
      repo:
        base-url: https://github.com/projectcalico/calico
      source-format: "https://api.github.com/repos/projectcalico/calico/contents/manifests/calico.yaml?ref=v{{ release }}"

  # CSI Driver Host Path - lightweight CSI for testing
  - name: csi-hostpath
    category: kubernetes-csi/csi-driver-host-path
    release: &csi-hostpath-version "1.17.1"
    installation:
      method: container-manifest
      repo:
        base-url: https://github.com/kubernetes-csi/csi-driver-host-path
      source-format: "local://components/csi-driver-host-path/csi-driver-host-path.yaml"

  - name: csi-hostpath-plugin
    category: kubernetes-csi/csi-driver-host-path
    release: "1.16.1"
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes-csi/csi-driver-host-path
      source-format: "registry.k8s.io/sig-storage/hostpathplugin:v{{ release }}"

  - name: csi-attacher
    category: kubernetes-csi/csi-driver-host-path
    release: "4.8.0"
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes-csi/external-attacher
      source-format: "registry.k8s.io/sig-storage/csi-attacher:v{{ release }}"

  - name: csi-provisioner
    category: kubernetes-csi/csi-driver-host-path
    release: "5.2.0"
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes-csi/external-provisioner
      source-format: "registry.k8s.io/sig-storage/csi-provisioner:v{{ release }}"

  - name: csi-node-driver-registrar
    category: kubernetes-csi/csi-driver-host-path
    release: "2.13.0"
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes-csi/csi-driver-host-path
      source-format: "registry.k8s.io/sig-storage/csi-node-driver-registrar:v{{ release }}"

  - name: csi-resizer
    category: kubernetes-csi/csi-driver-host-path
    release: "1.13.1"
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes-csi/external-resizer
      source-format: "registry.k8s.io/sig-storage/csi-resizer:v{{ release }}"

  - name: csi-snapshotter
    category: kubernetes-csi/csi-driver-host-path
    release: "8.2.0"
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes-csi/external-snapshotter
      source-format: "registry.k8s.io/sig-storage/csi-snapshotter:v{{ release }}"

  - name: csi-livenessprobe
    category: kubernetes-csi/csi-driver-host-path
    release: "2.15.0"
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes-csi/csi-driver-host-path
      source-format: "registry.k8s.io/sig-storage/livenessprobe:v{{ release }}"

  - name: csi-external-health-monitor-controller
    category: kubernetes-csi/csi-driver-host-path
    release: "0.14.0"
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes-csi/external-health-monitor
      source-format: "registry.k8s.io/sig-storage/csi-external-health-monitor-controller:v{{ release }}"

  # Test only component, nothing installed in the cluster
  - name: cncf-conformance
    category: Conformance
    release: "0.57.3"
    installation:
      method: none
    test:
      method: spread
      repo:
        base-url: https://github.com/vmware-tanzu/sonobuoy
      source-format: local://components/cncf-conformance/task.yaml
      environment:
        SONOBUOY_MODE: quick

networking:
  - name: default
    service-cidr: 10.96.0.0/12
    pod-cidr: 192.168.0.0/16
  # Pods on different nodes will not be able to communicate
  # Only host network pods and single-node workloads will function
