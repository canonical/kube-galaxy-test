name: baseline-k8s-1.35
description: "Baseline Kubernetes 1.35.0 cluster with standard components"
kubernetes-version: "1.35.0"
labels:
  environment: testing
  cluster-type: baseline
  k8s-version: "1.35"
  ci-skip-on-pr: "true"

nodes:
  control-plane: 1
  worker: 2

components:
  # Container runtime
  - name: containerd
    category: containerd
    release: "2.2.1"
    repo: "https://github.com/containerd/containerd"
    installation:
      method: "binary-archive"
      source_format: "{repo}/releases/download/v{release}/containerd-{release}.linux-{arch}.tar.gz"
    use-spread: false

  - name: runc
    category: containerd
    release: "1.3.4"
    repo: "https://github.com/opencontainers/runc"
    installation:
      method: "binary-archive"
      source_format: "{repo}/releases/download/v{release}/runc.{arch}"
    use-spread: false

  # cni-plugins
  - name: cni-plugins
    category: container-networking
    release: "1.8.0"
    repo: "https://github.com/containernetworking/plugins"
    installation:
      method: "binary-archive"
      source_format: "{repo}/releases/download/v{release}/cni-plugins-linux-{arch}-v{release}.tgz"
    use-spread: false

  - name: kubelet
    category: kubernetes/kubernetes
    release: "1.35.0"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "binary-archive"
      source_format: "{repo}/releases/download/v{release}/bin/linux/{arch}/kubelet"
    use-spread: false

  # Kubernetes binaries
  - name: kubeadm
    category: kubernetes/kubernetes
    release: "1.35.0"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "binary-archive"
      source_format: "{repo}/releases/download/v{release}/bin/linux/{arch}/kubeadm"
    use-spread: false

  - name: kubectl
    category: kubernetes/kubernetes
    release: "1.35.0"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "binary-archive"
      source_format: "{repo}/releases/download/v{release}/bin/linux/{arch}/kubectl"
    use-spread: false

  # Kubernetes control plane components (container images)
  - name: kube-apiserver
    category: kubernetes/kubernetes
    release: "1.35.0"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/kube-apiserver:v{release}"
    use-spread: false

  - name: kube-controller-manager
    category: kubernetes/kubernetes
    release: "1.35.0"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/kube-controller-manager:v{release}"
    use-spread: false

  - name: kube-scheduler
    category: kubernetes/kubernetes
    release: "1.35.0"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/kube-scheduler:v{release}"
    use-spread: false

  - name: kube-proxy
    category: kubernetes/kubernetes
    release: "1.35.0"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/kube-proxy:v{release}"
    use-spread: false

  - name: pause
    category: kubernetes/kubernetes
    release: "3.10.1"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/pause:3.10"
    use-spread: false

  # CoreDNS
  - name: coredns
    category: coredns
    release: "1.13.1"
    repo: "https://github.com/coredns/coredns"
    installation:
      method: "container-image"
      source_format: "coredns/coredns:v{release}"
    use-spread: false

  # etcd
  - name: etcd
    category: etcd
    release: "3.5.26"
    repo: "https://github.com/etcd-io/etcd"
    installation:
      method: "container-image"
      source_format: "quay.io/coreos/etcd:v{release}"
    use-spread: false

  - name: etcdctl
    category: etcd
    release: "3.5.26"
    repo: "https://github.com/etcd-io/etcd"
    installation:
      method: "binary-archive"
      source_format: "{repo}/releases/download/v{release}/etcd-v{release}-linux-{arch}.tar.gz"
    use-spread: false

  # Kubernetes addons
  - name: cluster-autoscaler
    category: kubernetes
    release: "1.35.0"
    repo: "https://github.com/kubernetes/autoscaler"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/autoscaling/cluster-autoscaler:v{release}"
    use-spread: false

  - name: node-problem-detector
    category: kubernetes
    release: "0.8.21"
    repo: "https://github.com/kubernetes/node-problem-detector"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/node-problem-detector/node-problem-detector:v{release}"
    use-spread: false

networking:
  - name: "default"
    service-cidr: "10.96.0.0/12"
    pod-cidr: "192.168.0.0/16"
