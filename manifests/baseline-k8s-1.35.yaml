name: baseline-k8s-1.35
description: Baseline Kubernetes 1.35.2 cluster with standard components
kubernetes-version: &k8s-version "1.35.2"
labels:
  ci-skip-on-pr: "true"

components:
  # Container runtime
  - name: runc
    category: containerd
    release: "1.3.4"
    repo:
      base-url: https://github.com/opencontainers/runc
    installation:
      method: binary
      source-format: "{{ repo.base_url }}/releases/download/v{{ release }}/runc.{{ arch }}"

  - name: containerd
    category: containerd
    release: "2.2.1"
    repo:
      base-url: https://github.com/containerd/containerd
    installation:
      method: binary-archive
      bin-path: "./bin/*"
      source-format: "{{ repo.base_url }}/releases/download/v{{ release }}/containerd-{{ release }}-linux-{{ arch }}.tar.gz"

  # cni-plugins
  - name: cni-plugins
    category: container-networking
    release: "1.9.0"
    repo:
      base-url: https://github.com/containernetworking/plugins
    installation:
      method: binary-archive
      source-format: "{{ repo.base_url }}/releases/download/v{{ release }}/cni-plugins-linux-{{ arch }}-v{{ release }}.tgz"

  # Kubernetes core binaries
  - name: kubelet
    category: kubernetes/kubernetes
    release: *k8s-version
    repo:
      base-url: https://github.com/kubernetes/kubernetes
    installation:
      method: binary
      source-format: "https://dl.k8s.io/release/v{{ release }}/bin/linux/{{ arch }}/kubelet"

  - name: kubeadm
    category: kubernetes/kubernetes
    release: *k8s-version
    repo:
      base-url: https://github.com/kubernetes/kubernetes
    installation:
      method: binary
      source-format: "https://dl.k8s.io/release/v{{ release }}/bin/linux/{{ arch }}/kubeadm"

  - name: kubectl
    category: kubernetes/kubernetes
    release: *k8s-version
    repo:
      base-url: https://github.com/kubernetes/kubernetes
    installation:
      method: binary
      source-format: "https://dl.k8s.io/release/v{{ release }}/bin/linux/{{ arch }}/kubectl"

  # Kubernetes control plane components
  - name: kube-apiserver
    category: kubernetes/kubernetes
    release: *k8s-version
    repo:
      base-url: https://github.com/kubernetes/kubernetes
    installation:
      method: container-image
      source-format: "registry.k8s.io/kube-apiserver:v{{ release }}"

  - name: kube-controller-manager
    category: kubernetes/kubernetes
    release: *k8s-version
    repo:
      base-url: https://github.com/kubernetes/kubernetes
    installation:
      method: container-image
      source-format: "registry.k8s.io/kube-controller-manager:v{{ release }}"

  - name: kube-scheduler
    category: kubernetes/kubernetes
    release: *k8s-version
    repo:
      base-url: https://github.com/kubernetes/kubernetes
    installation:
      method: container-image
      source-format: "registry.k8s.io/kube-scheduler:v{{ release }}"

  - name: kube-proxy
    category: kubernetes/kubernetes
    release: *k8s-version
    repo:
      base-url: https://github.com/kubernetes/kubernetes
    installation:
      method: container-image
      source-format: "registry.k8s.io/kube-proxy:v{{ release }}"

  - name: pause
    category: kubernetes/kubernetes
    release: "3.10.1"
    repo:
      base-url: https://github.com/kubernetes/kubernetes
    installation:
      method: container-image
      source-format: "registry.k8s.io/pause:{{ release }}"

  # etcd - required for cluster state
  - name: etcd
    category: etcd
    release: &etcd-version "3.6.6"
    repo:
      base-url: https://github.com/etcd-io/etcd
    installation:
      method: container-image
      source-format: "registry.k8s.io/etcd:v{{ release }}"

  # CoreDNS - required for cluster DNS
  - name: coredns
    category: coredns
    release: "1.13.1"
    repo:
      base-url: https://github.com/coredns/coredns
    installation:
      method: container-image
      source-format: "registry.k8s.io/coredns/coredns:v{{ release }}"

  - name: etcdctl
    category: etcd
    release: *etcd-version
    repo:
      base-url: https://github.com/etcd-io/etcd
    installation:
      method: binary-archive
      bin-path: "./etcd-v{{ release }}-linux-{{ arch }}/etcdctl"
      source-format: "{{ repo.base_url }}/releases/download/v{{ release }}/etcd-v{{ release }}-linux-{{ arch }}.tar.gz"

  # Kubernetes addons
  - name: cluster-autoscaler
    category: kubernetes
    release: "1.35.0"
    repo:
      base-url: https://github.com/kubernetes/autoscaler
    installation:
      method: container-image
      source-format: "registry.k8s.io/autoscaling/cluster-autoscaler:v{{ release }}"

  - name: node-problem-detector
    category: kubernetes
    release: "0.8.21"
    repo:
      base-url: https://github.com/kubernetes/node-problem-detector
    installation:
      method: container-image
      source-format: "registry.k8s.io/node-problem-detector/node-problem-detector:v{{ release }}"

networking:
  - name: default
    service-cidr: 10.96.0.0/12
    pod-cidr: 192.168.0.0/16
  # Pods on different nodes will not be able to communicate
  # Only host network pods and single-node workloads will function
