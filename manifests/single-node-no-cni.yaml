name: single-node-no-cni
description: "Single-node Kubernetes cluster without CNI - core components only"
kubernetes-version: "1.35.0"
labels:
  environment: testing
  cluster-type: minimal
  k8s-version: "1.35"
  cni: "none"

nodes:
  control-plane: 1
  worker: 0

components:
  # Container runtime (required for kubeadm)
  - name: runc
    category: containerd
    release: "1.3.4"
    repo: "https://github.com/opencontainers/runc"
    installation:
      method: "binary"
      source_format: "{repo}/releases/download/v{release}/runc.{arch}"
    use-spread: false

  - name: containerd
    category: containerd
    release: "2.2.1"
    repo: "https://github.com/containerd/containerd"
    installation:
      method: "binary-archive"
      source_format: "{repo}/releases/download/v{release}/containerd-{release}-linux-{arch}.tar.gz"
    use-spread: false

  # Kubernetes core binaries
  - name: kubelet
    category: kubernetes/kubernetes
    release: "1.35.0"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "binary"
      source_format: "https://dl.k8s.io/release/v{release}/bin/linux/{arch}/kubelet"
    use-spread: false

  - name: kubeadm
    category: kubernetes/kubernetes
    release: "1.35.0"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "binary"
      source_format: "https://dl.k8s.io/release/v{release}/bin/linux/{arch}/kubeadm"
    use-spread: false

  - name: kubectl
    category: kubernetes/kubernetes
    release: "1.35.0"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "binary"
      source_format: "https://dl.k8s.io/release/v{release}/bin/linux/{arch}/kubectl"
    use-spread: false

  # Kubernetes control plane components
  - name: kube-apiserver
    category: kubernetes/kubernetes
    release: "1.35.0"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/kube-apiserver:v{release}"
    use-spread: false

  - name: kube-controller-manager
    category: kubernetes/kubernetes
    release: "1.35.0"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/kube-controller-manager:v{release}"
    use-spread: false

  - name: kube-scheduler
    category: kubernetes/kubernetes
    release: "1.35.0"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/kube-scheduler:v{release}"
    use-spread: false

  - name: kube-proxy
    category: kubernetes/kubernetes
    release: "1.35.0"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/kube-proxy:v{release}"
    use-spread: false

  - name: pause
    category: kubernetes/kubernetes
    release: "3.10.1"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/pause:3.10"
    use-spread: false

  # etcd - required for cluster state
  - name: etcd
    category: etcd
    release: "3.5.26"
    repo: "https://github.com/etcd-io/etcd"
    installation:
      method: "container-image"
      source_format: "quay.io/coreos/etcd:v{release}"
    use-spread: false

  # CoreDNS - required for cluster DNS
  - name: coredns
    category: coredns
    release: "1.13.1"
    repo: "https://github.com/coredns/coredns"
    installation:
      method: "container-image"
      source_format: "coredns/coredns:v{release}"
    use-spread: false

networking:
  - name: "default"
    service-cidr: "10.96.0.0/12"
    pod-cidr: "192.168.0.0/16"
  # No CNI - cluster will not have pod networking configured
  # Pods on different nodes will not be able to communicate
  # Only host network pods and single-node workloads will function

storage:
  - name: "local-path"
    provisioner: "local-path"
    storage-classes:
      - name: "local-path"
        parameters:
          type: "default"

security:
  rbac: true
  network-policies: false
  pod-security-standards: "baseline"
