name: smoke-test
description: "Single-node Kubernetes cluster + calico - core components only"
kubernetes-version: &k8s-version "1.35.1"

components:
  # Container runtime (required for kubeadm)
  - name: runc
    category: containerd
    release: "1.3.4"
    repo: "https://github.com/opencontainers/runc"
    installation:
      method: "binary"
      source_format: "{repo}/releases/download/v{release}/runc.{arch}"
    use-spread: false

  - name: containerd
    category: containerd
    release: "2.2.1"
    repo: "https://github.com/containerd/containerd"
    installation:
      method: "binary-archive"
      source_format: "{repo}/releases/download/v{release}/containerd-{release}-linux-{arch}.tar.gz"
    use-spread: false

  # cni-plugins
  - name: cni-plugins
    category: container-networking
    release: "1.9.0"
    repo: "https://github.com/containernetworking/plugins"
    installation:
      method: "binary-archive"
      source_format: "{repo}/releases/download/v{release}/cni-plugins-linux-{arch}-v{release}.tgz"
    use-spread: false

  # Kubernetes core binaries
  - name: kubelet
    category: kubernetes/kubernetes
    release: *k8s-version
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "binary"
      source_format: "https://dl.k8s.io/release/v{release}/bin/linux/{arch}/kubelet"
    use-spread: false

  - name: kubeadm
    category: kubernetes/kubernetes
    release: *k8s-version
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "binary"
      source_format: "https://dl.k8s.io/release/v{release}/bin/linux/{arch}/kubeadm"
    use-spread: false

  - name: kubectl
    category: kubernetes/kubernetes
    release: *k8s-version
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "binary"
      source_format: "https://dl.k8s.io/release/v{release}/bin/linux/{arch}/kubectl"
    use-spread: false

  # Kubernetes control plane components
  - name: kube-apiserver
    category: kubernetes/kubernetes
    release: *k8s-version
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/kube-apiserver:v{release}"
    use-spread: false

  - name: kube-controller-manager
    category: kubernetes/kubernetes
    release: *k8s-version
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/kube-controller-manager:v{release}"
    use-spread: false

  - name: kube-scheduler
    category: kubernetes/kubernetes
    release: *k8s-version
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/kube-scheduler:v{release}"
    use-spread: false

  - name: kube-proxy
    category: kubernetes/kubernetes
    release: *k8s-version
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/kube-proxy:v{release}"
    use-spread: false

  - name: pause
    category: kubernetes/kubernetes
    release: "3.10.1"
    repo: "https://github.com/kubernetes/kubernetes"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/pause:{release}"
    use-spread: false

  # etcd - required for cluster state
  - name: etcd
    category: etcd
    release: "3.6.6-0"
    repo: "https://github.com/etcd-io/etcd"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/etcd:{release}"
    use-spread: false

  # CoreDNS - required for cluster DNS
  - name: coredns
    category: coredns
    release: "1.13.1"
    repo: "https://github.com/coredns/coredns"
    installation:
      method: "container-image"
      source_format: "registry.k8s.io/coredns/coredns:v{release}"
    use-spread: false

  # Calico - required for cluster networking
  - name: calico
    category: projectcalico/calico
    release:  &calico-version "3.30.6"
    repo: "https://github.com/projectcalico/calico"
    installation:
      method: "container-manifest"
      source_format: "raw.githubusercontent.com/projectcalico/calico/v{release}/manifests/calico.yaml"
    use-spread: false

  - name: calico-cni
    category: projectcalico/calico
    release: *calico-version
    repo: "https://github.com/projectcalico/calico"
    installation:
      method: "container-image"
      source_format: "docker.io/calico/cni:v{release}"
    use-spread: false

  - name: calico-node
    category: projectcalico/calico
    release: *calico-version
    repo: "https://github.com/projectcalico/calico"
    installation:
      method: "container-image"
      source_format: "docker.io/calico/cni:v{release}"
    use-spread: false

  - name: calico-kube-controllers
    category: projectcalico/calico
    release: *calico-version
    repo: "https://github.com/projectcalico/calico"
    installation:
      method: "container-image"
      source_format: "docker.io/calico/kube-controllers:v{release}"
    use-spread: false

networking:
  - name: "default"
    service-cidr: "10.96.0.0/12"
    pod-cidr: "192.168.0.0/16"
  # No CNI - cluster will not have pod networking configured
  # Pods on different nodes will not be able to communicate
  # Only host network pods and single-node workloads will function
