name: baseline-k8s-1.36
description: Baseline Kubernetes 1.36.0 cluster with standard components
kubernetes-version: &k8s-version 1.36.0-alpha.2
labels:
  ci-skip-on-pr: "true"

components:
  # Container runtime
  - name: runc
    category: containerd
    release: "1.3.4"
    installation:
      method: binary
      repo:
        base-url: https://github.com/opencontainers/runc
      source-format: "{{ repo.base-url }}/releases/download/v{{ release }}/runc.{{ arch }}"

  - name: crictl
    category: containerd
    release: "1.35.0"
    installation:
      method: binary-archive
      repo:
        base-url: https://github.com/kubernetes-sigs/cri-tools
      source-format: "{{ repo.base-url }}/releases/download/v{{ release }}/crictl-v{{ release }}-linux-{{ arch }}.tar.gz"

  - name: containerd
    category: containerd
    release: "2.2.1"
    installation:
      method: binary-archive
      repo:
        base-url: https://github.com/containerd/containerd
      bin-path: "./bin/*"
      source-format: "{{ repo.base-url }}/releases/download/v{{ release }}/containerd-{{ release }}-linux-{{ arch }}.tar.gz"

  # cni-plugins
  - name: cni-plugins
    category: container-networking
    release: "1.9.0"
    installation:
      method: binary-archive
      repo:
        base-url: https://github.com/containernetworking/plugins
      source-format: "{{ repo.base-url }}/releases/download/v{{ release }}/cni-plugins-linux-{{ arch }}-v{{ release }}.tgz"

  - name: kubelet
    category: kubernetes/kubernetes
    release: *k8s-version
    installation:
      method: binary
      repo:
        base-url: https://github.com/kubernetes/kubernetes
      source-format: "https://dl.k8s.io/release/v{{ release }}/bin/linux/{{ arch }}/kubelet"

  # Kubernetes binaries
  - name: kubeadm
    category: kubernetes/kubernetes
    release: *k8s-version
    installation:
      method: binary
      repo:
        base-url: https://github.com/kubernetes/kubernetes
      source-format: "https://dl.k8s.io/release/v{{ release }}/bin/linux/{{ arch }}/kubeadm"

  - name: kubectl
    category: kubernetes/kubernetes
    release: *k8s-version
    installation:
      method: binary
      repo:
        base-url: https://github.com/kubernetes/kubernetes
      source-format: "https://dl.k8s.io/release/v{{ release }}/bin/linux/{{ arch }}/kubectl"

  # Kubernetes control plane components (container images)
  - name: kube-apiserver
    category: kubernetes/kubernetes
    release: *k8s-version
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes/kubernetes
      source-format: "registry.k8s.io/kube-apiserver:v{{ release }}"
      retag-format: "{{ mirror.base-url }}/kube-apiserver:v{{ release }}"

  - name: kube-controller-manager
    category: kubernetes/kubernetes
    release: *k8s-version
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes/kubernetes
      source-format: "registry.k8s.io/kube-controller-manager:v{{ release }}"
      retag-format: "{{ mirror.base-url }}/kube-controller-manager:v{{ release }}"

  - name: kube-scheduler
    category: kubernetes/kubernetes
    release: *k8s-version
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes/kubernetes
      source-format: "registry.k8s.io/kube-scheduler:v{{ release }}"
      retag-format: "{{ mirror.base-url }}/kube-scheduler:v{{ release }}"

  - name: kube-proxy
    category: kubernetes/kubernetes
    release: *k8s-version
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes/kubernetes
      source-format: "registry.k8s.io/kube-proxy:v{{ release }}"
      retag-format: "{{ mirror.base-url }}/kube-proxy:v{{ release }}"

  - name: pause
    category: kubernetes/kubernetes
    release: "3.10.1"
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes/kubernetes
      source-format: "registry.k8s.io/pause:{{ release }}"
      retag-format: "{{ mirror.base-url }}/pause:{{ release }}"

  # etcd
  - name: etcd
    category: etcd
    release: &etcd-version "3.6.8"
    installation:
      method: container-image
      repo:
        base-url: https://github.com/etcd-io/etcd
      source-format: "registry.k8s.io/etcd:v{{ release }}"
      retag-format: "{{ mirror.base-url }}/etcd:{{ release }}-0"

  # CoreDNS
  - name: coredns
    category: coredns
    release: "1.14.1"
    installation:
      method: container-image
      repo:
        base-url: https://github.com/coredns/coredns
      source-format: "registry.k8s.io/coredns/coredns:v{{ release }}"
      retag-format: "{{ mirror.base-url }}/coredns:v{{ release }}"

  - name: etcdctl
    category: etcd
    release: *etcd-version
    installation:
      method: binary-archive
      repo:
        base-url: https://github.com/etcd-io/etcd
      bin-path: "./etcd-v{{ release }}-linux-{{ arch }}/etcdctl"
      source-format: "{{ repo.base-url }}/releases/download/v{{ release }}/etcd-v{{ release }}-linux-{{ arch }}.tar.gz"

  # Kubernetes addons
  - name: cluster-autoscaler
    category: kubernetes
    release: "1.35.0"
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes/autoscaler
      source-format: "registry.k8s.io/autoscaling/cluster-autoscaler:v{{ release }}"

  - name: node-problem-detector
    category: kubernetes
    release: "0.8.21"
    installation:
      method: container-image
      repo:
        base-url: https://github.com/kubernetes/node-problem-detector
      source-format: "registry.k8s.io/node-problem-detector/node-problem-detector:v{{ release }}"

  - name: cncf-full
    category: Conformance
    release: "0.57.3"
    installation:
      method: none
    test:
      method: spread
      repo:
        base-url: https://github.com/canonical/mx-kubernetes
        subdir: spread/cncf-full
        ref: test/kube-galaxy/cncf/test-definitions
      source-format: "https://api.github.com/repos/canonical/mx-kubernetes/contents/{{ repo.subdir }}/task.yaml?ref={{ repo.ref }}"
      environment:
        TEST_TIMEOUT_S: "7200"
        TEST_TIMEOUT_M: "120"

networking:
  - name: default
    service-cidr: 10.96.0.0/12
    pod-cidr: 192.168.0.0/16
